name: Tests

on:
  workflow_call:

jobs:
  test:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.14"
            uv-project: "."
            latest: true
          - python-version: "3.13"
            uv-project: "tests/env/compat"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - run: uv sync --project ${{ matrix.uv-project }} --no-install-project
      - run: uv run --project ${{ matrix.uv-project }} pytest --cov --cov-report=xml --cov-fail-under=95
      - name: Upload coverage to Codecov
        if: matrix.latest
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
