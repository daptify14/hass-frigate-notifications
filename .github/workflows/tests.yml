name: Tests

on:
  workflow_call:

jobs:
  stable:
    name: Tests (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "py3.14"
      - run: uv sync --no-install-project --prerelease=allow --no-dev --group test
      - run: uv pip install --prerelease=allow "homeassistant==2026.3.*"
      - run: uv run pytest --cov --cov-report=xml --cov-fail-under=95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  compat:
    # Minimum supported: HA 2025.6.x / Py 3.13 (first HA with config subentries + read-only selectors)
    name: Tests (compat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "compat"
      - run: uv sync --project tests/env/compat
      - run: uv run --project tests/env/compat pytest
