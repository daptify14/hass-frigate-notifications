name: Validate

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "custom_components/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master
