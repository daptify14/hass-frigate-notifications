version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: homeassistant
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    groups:
      hooks:
        patterns: ["*"]
