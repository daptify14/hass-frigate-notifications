repos:
  - repo: builtin
    hooks:
      - id: check-yaml
        priority: 0
      - id: check-json
        priority: 0
      - id: check-toml
        priority: 0
      - id: trailing-whitespace
        priority: 0
      - id: end-of-file-fixer
        priority: 0
      - id: check-added-large-files
        args: ['--maxkb=512']
        priority: 0

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        priority: 0

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --show-fixes
        priority: 10
      - id: ruff-format
        files: ^(custom_components/|tests/)
        priority: 11

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
        files: ^(README\.md|docs/)
        priority: 0

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/
        priority: 20

  - repo: local
    hooks:
      - id: ty
        name: ty typecheck
        entry: uv run ty check --error-on-warning
        language: system
        types: [python]
        pass_filenames: false
        priority: 30
